<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manga Translator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
  header { text-align: center; padding: 2rem 1rem 1rem; }
  header h1 { font-size: 1.8rem; color: #e94560; }
  header p { color: #888; margin-top: .3rem; }

  .dropzone {
    max-width: 700px; margin: 1rem auto; padding: 3rem 1rem;
    border: 2px dashed #444; border-radius: 12px; text-align: center;
    cursor: pointer; transition: border-color .2s;
  }
  .dropzone:hover, .dropzone.drag { border-color: #e94560; }
  .dropzone p { color: #888; font-size: .95rem; }
  .dropzone .icon { font-size: 2.5rem; margin-bottom: .5rem; }

  .results { max-width: 900px; margin: 1rem auto; padding: 0 1rem; }
  .card {
    display: flex; gap: 1rem; background: #16213e; border-radius: 10px;
    padding: 1rem; margin-bottom: .75rem; align-items: center;
  }
  .card img { max-height: 200px; border-radius: 6px; object-fit: contain; background: #0f0f23; }
  .card .info { flex: 1; min-width: 0; }
  .card .info .name { font-weight: 600; margin-bottom: .3rem; font-size: .9rem; word-break: break-all; }
  .card .info .status { font-size: .8rem; }
  .card .info .status.pending { color: #888; }
  .card .info .status.processing { color: #f0c040; }
  .card .info .status.done { color: #4ecca3; }
  .card .info .status.error { color: #e94560; }
  .card .actions { display: flex; flex-direction: column; gap: .4rem; }
  .card .actions a, .card .actions button {
    background: #e94560; color: #fff; border: none; padding: .4rem .8rem;
    border-radius: 6px; cursor: pointer; font-size: .8rem; text-decoration: none; text-align: center;
  }
  .card .actions a:hover, .card .actions button:hover { background: #c73650; }

  .hidden { display: none; }
  #file-input { display: none; }
</style>
</head>
<body>

<header>
  <h1>Manga Translator</h1>
  <p>Upload Japanese manga pages — get English translations</p>
</header>

<div class="dropzone" id="dropzone">
  <div class="icon">+</div>
  <p>Drop images here or click to browse</p>
  <p style="font-size:.8rem;margin-top:.4rem">JPEG, PNG — multiple files supported</p>
</div>

<input type="file" id="file-input" accept="image/jpeg,image/png" multiple>

<div class="results hidden" id="results"></div>

<script>
const API = '/translate';
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('file-input');
const results = document.getElementById('results');

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag');
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', () => handleFiles(fileInput.files));

function handleFiles(files) {
  if (!files.length) return;
  results.classList.remove('hidden');
  Array.from(files).forEach(file => addCard(file));
}

function addCard(file) {
  const card = document.createElement('div');
  card.className = 'card';

  const img = document.createElement('img');
  img.src = URL.createObjectURL(file);
  img.alt = file.name;

  const info = document.createElement('div');
  info.className = 'info';
  info.innerHTML = `<div class="name">${file.name}</div><div class="status pending">Queued</div>`;

  const actions = document.createElement('div');
  actions.className = 'actions';

  card.append(img, info, actions);
  results.prepend(card);

  translateImage(file, info, actions, img);
}

async function translateImage(file, infoEl, actionsEl, previewImg) {
  const statusEl = infoEl.querySelector('.status');
  statusEl.textContent = 'Translating...';
  statusEl.className = 'status processing';

  const form = new FormData();
  form.append('image', file);

  try {
    const res = await fetch(API, { method: 'POST', body: form });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: res.statusText }));
      throw new Error(err.detail || 'Translation failed');
    }

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);

    previewImg.src = url;
    statusEl.textContent = 'Done ✓';
    statusEl.className = 'status done';

    const downloadLink = document.createElement('a');
    downloadLink.href = url;
    downloadLink.download = 'translated_' + file.name;
    downloadLink.textContent = '⬇ Download';
    actionsEl.appendChild(downloadLink);

  } catch (e) {
    statusEl.textContent = 'Error: ' + e.message;
    statusEl.className = 'status error';

    const retryBtn = document.createElement('button');
    retryBtn.textContent = 'Retry';
    retryBtn.onclick = () => {
      actionsEl.innerHTML = '';
      translateImage(file, infoEl, actionsEl, previewImg);
    };
    actionsEl.appendChild(retryBtn);
  }
}
</script>

</body>
</html>
